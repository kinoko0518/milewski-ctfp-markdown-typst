name: Generate and Upload PDF

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # mainブランチをチェックアウト
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      # Typst環境のセットアップ
      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          typst_version: latest

      # Pandocのセットアップ
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: latest

      # 原ノ味フォントをGitHubからダウンロードして配置
      - name: Install Harano Aji Fonts
        run: |
          git clone --depth 1 https://github.com/trueroad/HaranoAjiFonts.git
          mkdir -p ~/.local/share/fonts
          find HaranoAjiFonts -name "*.otf" -exec cp {} ~/.local/share/fonts/ \;
          fc-cache -fv

      # PDFを生成
      - name: Run convert.sh and compile main.typ
        run: |
          chmod +x ./convert.sh
          ./convert.sh
          typst compile main.typ main.pdf

      # 生成されたPDFをReleaseのアセットに追加
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: main.pdf
