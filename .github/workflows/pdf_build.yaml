name: Generate and Upload PDF

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # mainブランチをチェックアウト
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      # Pandocと原ノ味フォントをaptでインストール
      - name: Install Pandoc and Harano Aji Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-haranoaji

      # Typst環境のセットアップ
      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      # Pandocのみaptでインストール
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # 原ノ味フォントをGitHubからダウンロードして配置
      - name: Install Harano Aji Fonts
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/trueroad/HaranoAjiFonts/releases/latest | grep "browser_download_url.*\.zip" | cut -d '"' -f 4)
          wget -O HaranoAjiFonts.zip "$ASSET_URL"
          unzip HaranoAjiFonts.zip
          mkdir -p ~/.local/share/fonts
          find . -name "*.otf" -exec cp {} ~/.local/share/fonts/ \;
          fc-cache -fv

      # 生成されたPDFをReleaseのアセットに追加
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: main.pdf
